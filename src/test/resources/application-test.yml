spring:
  datasource:
    url: jdbc:h2:mem:vibedev_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 3025

search:
  engine: like

app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hmac-sha256-minimum-256-bits
  upload:
    path: ./target/test-uploads
  cors:
    allowed-origins:
      - http://localhost:3000
  mail:
    from: test@vibedev.local
