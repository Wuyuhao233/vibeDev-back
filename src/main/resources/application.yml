server:
  port: 8080

spring:
  application:
    name: vibedev-backend

  datasource:
    url: jdbc:mysql://localhost:3306/vibedev?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:vibedev-jwt-secret-key-must-be-at-least-256-bits-long}
    access-token-ttl: 900
    refresh-token-ttl: 604800
    reset-token-ttl: 1800
    verify-email-token-ttl: 3600

  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-file-size: 10485760
    allowed-image-types: image/jpeg,image/png,image/gif,image/webp

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

  mail:
    from: ${MAIL_FROM:noreply@vibedev.local}

cas:
  server_url: ${CAS_SERVER_URL:https://cas.example.com}
  login_url: ${CAS_LOGIN_URL:https://cas.example.com/login}
  service_validate_url: ${CAS_SERVICE_VALIDATE_URL:https://cas.example.com/serviceValidate}
  service: ${CAS_SERVICE:https://forum.example.com/api/v1/auth/cas-login}

logging:
  level:
    com.vibedev: DEBUG
    org.springframework.security: INFO
